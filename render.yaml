services:
  - type: web
    name: wealthmanagement-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
