services:
  - type: web
    name: wealthmanagement-api
    runtime: python
    plan: free
    rootDir: backend
    dockerfile: false
    buildCommand: pip install -r requirements.txt
    startCommand: ./render-start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
